<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>For My Love</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:ital,wght@0,600;1,500&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --rose: #ff4f9a;
    --rose-bright: #ff2e77;
    --ink: #0a0510;
    --cream: #fbeef2;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0;padding:0;
    height:100%;
    background:var(--ink);
    overflow:hidden;
  }
  body{
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:'Poppins',sans-serif;
  }

  /* Frame keeps the exact aspect ratio of the background artwork
     (1023 x 1537) so every overlaid element lines up on any phone. */
  .frame{
    position:relative;
    height:100dvh;
    width:calc(100dvh * (1023/1537));
    max-width:100vw;
    max-height:100vh;
    aspect-ratio: 1023 / 1537;
  }
  @media (min-aspect-ratio: 1023/1537){
    .frame{ width:100vw; height:calc(100vw * (1537/1023)); }
  }

  .frame img.bg{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
  }

  .ambient{
    position:absolute; inset:0; pointer-events:none;
    background:
      radial-gradient(ellipse at 78% 62%, rgba(255,140,60,0.10), transparent 30%),
      radial-gradient(ellipse at 50% 12%, rgba(255,79,154,0.10), transparent 45%);
    mix-blend-mode:screen;
    animation: breathe 6s ease-in-out infinite;
  }
  @keyframes breathe{
    0%,100%{opacity:.6;}
    50%{opacity:1;}
  }

  canvas.rain{
    position:absolute; inset:0; width:100%; height:100%;
    pointer-events:none; opacity:.5; mix-blend-mode:screen;
  }

  /* floating glowing hearts, drifting slowly upward like the reference art */
  .hearts{ position:absolute; inset:0; overflow:hidden; pointer-events:none; }
  .heart{
    position:absolute;
    bottom:-10%;
    color:var(--rose);
    text-shadow: 0 0 10px rgba(255,79,154,0.9), 0 0 22px rgba(255,46,119,0.6);
    animation: floatUp linear infinite;
    opacity:0;
  }
  @keyframes floatUp{
    0%{ opacity:0; transform: translateY(0) translateX(0) scale(1); }
    8%{ opacity:.85; }
    90%{ opacity:.7; }
    100%{ opacity:0; transform: translateY(-115dvh) translateX(var(--drift,20px)) scale(0.8); }
  }

  /* ---------- text content, laid out to match the reference design ---------- */
  .title-wrap{
    position:absolute; left:0; right:0; top:14.5%;
    text-align:center;
  }
  .title{
    font-family:'Great Vibes', cursive;
    font-size:clamp(40px, 12vw, 66px);
    color:#fff5f8;
    text-shadow: 0 0 14px rgba(255,79,154,0.85), 0 0 34px rgba(255,46,119,0.5);
    margin:0;
  }
  .title .heart-icon{
    font-family:'Poppins',sans-serif;
    font-size:0.65em;
    vertical-align:middle;
  }

  .divider{
    position:absolute; left:14%; right:14%; top:29.8%;
    display:flex; align-items:center; gap:10px;
  }
  .divider .line{ flex:1; height:1px; background:linear-gradient(90deg, transparent, var(--rose), transparent); }
  .divider .mark{ color:var(--rose); font-size:14px; text-shadow:0 0 8px rgba(255,79,154,0.8); }

  .greeting{
    position:absolute; left:0; right:0; top:33.6%;
    text-align:center;
    font-size:clamp(18px, 5.4vw, 24px);
    color:#f4e9ee;
    letter-spacing:0.5px;
  }
  .greeting .name{
    color:var(--rose);
    font-weight:600;
  }
  .greeting .heart-icon{ color:var(--rose-bright); }

  .quote-box{
    position:absolute; left:15%; right:15%; top:38.8%;
    text-align:center;
    border:1px dashed rgba(255,79,154,0.55);
    border-radius:14px;
    padding:2.4% 6%;
    font-family:'Playfair Display', serif;
    font-style:italic;
    font-size:clamp(13px, 3.9vw, 16px);
    color:#f6ecf0;
  }

  .umbrella{
    position:absolute; left:0; right:0; top:44.4%;
    text-align:center;
    font-size:clamp(20px, 5vw, 26px);
  }

  .lock-form{
    position:absolute;
    left:22.5%;
    top:49.4%;
    width:55%;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:2.2%;
  }
  .pw-wrap{ width:100%; height:5.6%; position:relative; }
  .pw-wrap input{
    all:unset;
    box-sizing:border-box;
    width:100%; height:100%;
    background:rgba(10,4,10,0.35);
    border:1px solid rgba(255,79,154,0.55);
    border-radius:999px;
    color:var(--cream);
    font-family:'Poppins',sans-serif;
    font-size:clamp(12px, 3.6vw, 17px);
    letter-spacing:0.5px;
    padding:0 14% 0 15%;
    text-align:center;
    caret-color: var(--rose);
    transition: box-shadow .25s ease, border-color .25s ease;
  }
  .pw-wrap input::placeholder{ color:rgba(251,238,242,0.55); }
  .pw-wrap input:focus{
    border-color: var(--rose-bright);
    box-shadow: 0 0 18px rgba(255,46,119,0.55);
  }

  .open-btn{
    all:unset;
    box-sizing:border-box;
    margin-top:1.2%;
    width:70%;
    height:6.2%;
    border-radius:999px;
    text-align:center;
    display:flex; align-items:center; justify-content:center; gap:8px;
    font-family:'Poppins',sans-serif;
    font-weight:600;
    letter-spacing:1px;
    font-size:clamp(13px, 4vw, 19px);
    color:#3a0016;
    background: linear-gradient(180deg, #ff7db1, #ff2e77);
    box-shadow: 0 6px 20px rgba(255,46,119,0.45), inset 0 1px 0 rgba(255,255,255,0.35);
    cursor:pointer;
    transition: transform .15s ease, box-shadow .15s ease, filter .15s ease;
  }
  .open-btn:active{ transform: scale(0.97); }
  .open-btn:hover{ filter:brightness(1.06); box-shadow: 0 8px 26px rgba(255,46,119,0.6); }

  .hint{
    position:absolute; left:8%; right:8%; top:57.9%;
    text-align:center;
    font-size:clamp(10.5px, 2.9vw, 12.5px);
    line-height:1.5;
    color:rgba(251,238,242,0.75);
    letter-spacing:0.2px;
    min-height:2.4em;
  }
  .hint.error{ color:#ffb3cf; }

  .divider2{
    position:absolute; left:20%; right:20%; top:65.9%;
    display:flex; align-items:center; gap:10px;
  }
  .divider2 .line{ flex:1; height:1px; background:repeating-linear-gradient(90deg, var(--rose) 0 4px, transparent 4px 8px); opacity:.7; }
  .divider2 .mark{ color:var(--rose); font-size:14px; text-shadow:0 0 8px rgba(255,79,154,0.8); }

  .quote2{
    position:absolute; left:12%; right:12%; top:69.5%;
    text-align:center;
    font-family:'Playfair Display', serif;
    font-style:italic;
    font-size:clamp(15px, 4.4vw, 19px);
    color:#f6ecf0;
    line-height:1.4;
  }
  .quote2 .mark{ color:var(--rose); font-size:1.4em; opacity:.85; }

  .small-heart{
    position:absolute; left:0; right:0; top:78.3%;
    text-align:center;
    color:var(--rose);
    font-size:18px;
    text-shadow:0 0 10px rgba(255,79,154,0.8);
  }

  .shake{ animation: shake .45s ease; }
  @keyframes shake{
    10%,90%{ transform: translateX(-1px); }
    20%,80%{ transform: translateX(2px); }
    30%,50%,70%{ transform: translateX(-4px); }
    40%,60%{ transform: translateX(4px); }
  }

  .fade-out{ animation: fadeOut .7s ease forwards; }
  @keyframes fadeOut{ to{ opacity:0; } }
</style>
</head>
<body>

<div class="frame" id="frame">
  <img class="bg" src="lockscreen-bg-empty.png" alt="For My Love">
  <div class="ambient"></div>
  <canvas class="rain" id="rainCanvas"></canvas>
  <div class="hearts" id="heartsLayer"></div>

  <div class="title-wrap">
    <span class="title">For My Love <span class="heart-icon">♡</span></span>
  </div>

  <div class="divider">
    <span class="line"></span><span class="mark">♡</span><span class="line"></span>
  </div>

  <!-- ✍️ Replace "love" with her name if you'd like -->
  <div class="greeting">
    <span class="heart-icon">♥</span> Hi <span class="name">Barxakam</span> <span class="heart-icon">♥</span>
  </div>

  <!-- ✍️ Feel free to swap this line for your own -->
  <div class="quote-box">You love the rain, and I love you.</div>

  <div class="umbrella">☔</div>

  <form class="lock-form" id="lockForm" autocomplete="off">
    <div class="pw-wrap">
      <input
        id="pwInput"
        type="text"
        inputmode="text"
        placeholder="Enter Password"
        aria-label="Password"
      >
    </div>
    <button type="submit" class="open-btn" id="openBtn">Open ♡</button>
  </form>

  <div class="hint" id="hint"></div>

  <div class="divider2">
    <span class="line"></span><span class="mark">♡</span><span class="line"></span>
  </div>

  <div class="quote2"><span class="mark">"</span>You are my today and all of my tomorrows.<span class="mark">"</span></div>

  <div class="small-heart">♡</div>
</div>

<script>
  // ---- decorative rain streaks over the artwork ----
  const canvas = document.getElementById('rainCanvas');
  const ctx = canvas.getContext('2d');
  const frame = document.getElementById('frame');
  let drops = [];

  function sizeCanvas(){
    const r = frame.getBoundingClientRect();
    canvas.width = r.width;
    canvas.height = r.height;
    const count = Math.floor((canvas.width * canvas.height) / 9000);
    drops = Array.from({length: count}, () => spawnDrop());
  }
  function spawnDrop(){
    return {
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      len: 8 + Math.random() * 18,
      speed: 3 + Math.random() * 5,
      drift: 0.6 + Math.random() * 0.6,
      alpha: 0.12 + Math.random() * 0.3
    };
  }
  function tick(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.strokeStyle = 'rgba(255,200,225,0.7)';
    ctx.lineWidth = 1;
    for(const d of drops){
      ctx.globalAlpha = d.alpha;
      ctx.beginPath();
      ctx.moveTo(d.x, d.y);
      ctx.lineTo(d.x - d.drift*3, d.y + d.len);
      ctx.stroke();
      d.y += d.speed;
      d.x -= d.drift;
      if(d.y > canvas.height){
        d.y = -d.len;
        d.x = Math.random() * canvas.width;
      }
    }
    ctx.globalAlpha = 1;
    requestAnimationFrame(tick);
  }
  window.addEventListener('resize', sizeCanvas);
  sizeCanvas();
  tick();

  // ---- floating glowing hearts ----
  const heartsLayer = document.getElementById('heartsLayer');
  const glyphs = ['♥','♡'];
  function spawnHeart(){
    const el = document.createElement('span');
    el.className = 'heart';
    el.textContent = glyphs[Math.floor(Math.random()*glyphs.length)];
    const size = 10 + Math.random()*22;
    el.style.left = (Math.random()*100) + '%';
    el.style.fontSize = size + 'px';
    el.style.setProperty('--drift', (Math.random()*60 - 30) + 'px');
    const duration = 9 + Math.random()*10;
    el.style.animationDuration = duration + 's';
    heartsLayer.appendChild(el);
    setTimeout(() => el.remove(), duration*1000 + 200);
  }
  setInterval(spawnHeart, 550);
  for(let i=0;i<10;i++) setTimeout(spawnHeart, i*300);

  // ---- password gate ----
  // The correct password is exactly: 24july  (case-insensitive, no spaces)
  const PASSWORD = "24july";

  // ✍️ Edit this clue if you change the password above, to match your real date/meaning.
  const CLUE = "it's the date we first met, written like \u201c3march\u201d \u2014 day then month, no spaces, no year.";

  const form = document.getElementById('lockForm');
  const input = document.getElementById('pwInput');
  const hint = document.getElementById('hint');

  form.addEventListener('submit', (e) => {
    e.preventDefault();
    const value = input.value.trim().toLowerCase().replace(/\s+/g,'');
    if(value === PASSWORD){
      hint.textContent = '';
      frame.classList.add('fade-out');
      setTimeout(() => {
        window.location.href = 'message.html';
      }, 650);
    } else {
      hint.textContent = CLUE;
      hint.classList.add('error');
      form.classList.remove('shake');
      void form.offsetWidth;
      form.classList.add('shake');
    }
  });
</script>

</body>
</html>
